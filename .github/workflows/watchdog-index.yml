name: スニダン価格インデックス 死活監視

on:
  schedule:
    # JST 08:00 = UTC 23:00（6:20の更新後にチェック）
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google Service Account credentials
        run: echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > credentials.json

      - name: Check freshness
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
        run: python3 scripts/watchdog_index.py

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
