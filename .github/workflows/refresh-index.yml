name: スニダン価格インデックス更新

on:
  schedule:
    # JST 06:20 = UTC 21:20 (本体価格更新の後)
    - cron: '20 21 * * *'
  workflow_dispatch:
    inputs:
      reprice:
        description: '価格を再取得する(true=日次相当 / false=ロードのみ)'
        type: boolean
        default: false

jobs:
  refresh-index:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Google Service Account credentials
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > credentials.json
          python3 -c "import json; d=json.load(open('credentials.json')); print('client_email:', d.get('client_email'))"

      - name: Refresh index sheet
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.reprice }}" = "true" ]; then
            echo "== reprice mode =="
            python3 scripts/refresh_index.py --reprice 2>&1 | tee index.log
          else
            echo "== load-only mode =="
            python3 scripts/refresh_index.py 2>&1 | tee index.log
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json

      - name: Notify Chatwork on failure
        if: failure()
        env:
          CHATWORK_API_TOKEN: ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_ID: ${{ secrets.CHATWORK_ROOM_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          {
            echo "[toall]"
            echo "[info][title]❌ スニダン価格インデックス更新 失敗[/title]"
            echo "Run: $RUN_URL"
            echo "時刻(JST): $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')"
            echo ""
            echo "ログ末尾:"
            tail -20 index.log 2>/dev/null || echo "(index.log なし)"
            echo "[/info]"
          } > body.txt
          curl -s -X POST "https://api.chatwork.com/v2/rooms/$CHATWORK_ROOM_ID/messages" \
            -H "X-ChatWorkToken: $CHATWORK_API_TOKEN" \
            --data-urlencode "body@body.txt" > /dev/null
