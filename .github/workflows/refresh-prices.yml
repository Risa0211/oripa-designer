name: 毎朝スニダン価格自動更新

on:
  schedule:
    # JST 06:00 = UTC 21:00 (前日)
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動実行も可

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Restore Google Service Account credentials
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}' > credentials.json
          # 存在確認 (秘密の中身は出さない)
          python3 -c "import json; d=json.load(open('credentials.json')); print('client_email:', d.get('client_email'))"

      - name: Refresh Snkrdunk prices in DB
        run: |
          python3 scripts/refresh_all_prices.py

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json
